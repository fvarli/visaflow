<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="Privacy-first visa application dossier and document checklist manager."
    />
    <title>VisaFlow</title>
    <script>
      // Applies the stored theme and language before first paint, so a
      // dark-mode user never sees a white flash and assistive technology gets
      // the right language immediately. Reads only the two non-personal
      // preference keys (ADR-006, ADR-013).
      ;(function () {
        try {
          var stored = localStorage.getItem('visaflow-theme')
          var dark =
            stored === 'dark' ||
            ((!stored || stored === 'system') &&
              window.matchMedia('(prefers-color-scheme: dark)').matches)
          if (dark) document.documentElement.classList.add('dark')
          document.documentElement.style.colorScheme = dark ? 'dark' : 'light'
        } catch (e) {
          /* storage unavailable — fall through to the light default */
        }
        try {
          // Turkish is the default; the browser language is never consulted.
          var locale = localStorage.getItem('visaflow-locale')
          document.documentElement.lang =
            locale === 'en' || locale === 'tr' ? locale : 'tr'
        } catch (e) {
          document.documentElement.lang = 'tr'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
